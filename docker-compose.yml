services:

  # 1. Base de Datos (PostgreSQL)
  postgres:
    image: postgres:16
    container_name: streaming_database
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      # Persistencia de los datos de PostgreSQL
      - postgres_data:/var/lib/postgresql/data
      # Monta el script de inicialización DDL
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      # CORRECCIÓN:'perfil_usuarios.csv'
      - type: bind
        source: ./database/perfil_usuarios.csv
        target: /docker-entrypoint-initdb.d/perfil_usuarios.csv
      
  # 2. Proceso ETL y Entrenamiento
  etl:
    build:
      context: .                               # Contexto en la raíz para poder copiar /etl y /data
      dockerfile: ./docker/etl.Dockerfile      # Va a buscar la instrucción de compilación aquí
    container_name: streaming_etl
    volumes:
      # Compartimos la carpeta data para guardar el dataset unificado y procesado
      - ./data:/app/data
      # Compartimos el volumen de modelos para guardar el modelo KMeans entrenado
      - modelos_vol:/app/models
    depends_on:
      - postgres

  # 3. Servicio de API (RESTful) - Modificado para hacer match con el request del Dashboard
  ml-service:
    build:
      context: .
      dockerfile: ./docker/api.Dockerfile
    container_name: streaming_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - modelos_vol:/app/models
    depends_on:
      - postgres
      - etl                                    # Espera a que el ETL termine

  # 4. Dashboard Interactivo (Streamlit / Dash)
  dashboard:
    build:
      context: .
      dockerfile: ./docker/dashboard.Dockerfile
    container_name: streaming_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - modelos_vol:/app/models
    depends_on:
      - ml-service                             # Se levanta cuando la API esté operativa

volumes:
  postgres_data:                           
  modelos_vol: